[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "xrtm"
version = "0.1.0"
description = "The xRtm Framework (Generative Forecasting)."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [
    {name = "XRTM Team", email = "moy@xrtm.org"}
]
dependencies = [
    "xrtm-data>=0.1.0",
    "xrtm-eval>=0.1.0",
    "xrtm-forecast>=0.1.0",
    "xrtm-train>=0.1.0"
]

[project.urls]
Repository = "https://github.com/xrtm-org/xrtm"
Documentation = "https://xrtm.org"
Issues = "https://github.com/xrtm-org/xrtm/issues"

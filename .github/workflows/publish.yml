name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  gate1:
    name: Gate 1 release checks
    uses: ./.github/workflows/ci.yml

  pypi-publish:
    name: Upload release to PyPI
    needs: gate1
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/xrtm
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - name: Summarize release gate posture
        shell: bash
        run: |
          {
            echo "### Release publish gate posture"
            echo
            echo "- Gate 1 is enforced here by reusing \`.github/workflows/ci.yml\` on the release commit before PyPI publish."
            echo "- Gate 2 remains required for xrtm releases via the existing CI \`workflow_dispatch\` clean-room jobs: run \`cleanroom_artifact_source=wheelhouse\` before release readiness and rerun with \`pypi\` after publish for published-artifact evidence."
            echo
            echo "This workflow publishes only after Gate 1 succeeds; it does not replace the required clean-room release evidence."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

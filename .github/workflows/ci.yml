name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pytest build

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/xrtm

      - name: Pytest
        run: pytest tests

      - name: Build package
        run: python -m build

      - name: Install built wheel and smoke CLI
        shell: bash
        run: |
          python -m venv /tmp/xrtm-wheel-smoke
          /tmp/xrtm-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/xrtm-wheel-smoke/bin/python -m pip install dist/xrtm-*.whl
          /tmp/xrtm-wheel-smoke/bin/xrtm --help
          /tmp/xrtm-wheel-smoke/bin/xrtm doctor
          /tmp/xrtm-wheel-smoke/bin/xrtm web --smoke

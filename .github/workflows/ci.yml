name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      coordination_context:
        description: "Linked issue/PR family or release-train note"
        required: false
        type: string
      data_ref:
        description: "Explicit xrtm-org/data ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      eval_ref:
        description: "Explicit xrtm-org/eval ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      forecast_ref:
        description: "Explicit xrtm-org/forecast ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      train_ref:
        description: "Explicit xrtm-org/train ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      cleanroom_artifact_source:
        description: "Run provider-free clean-room release validation (skip, wheelhouse, or pypi)"
        required: false
        default: skip
        type: choice
        options:
          - skip
          - wheelhouse
          - pypi
      commercial_openai_profile:
        description: "Run Commercial OpenAI-compatible Gate 2 validation (skip or openai)"
        required: false
        default: skip
        type: choice
        options:
          - skip
          - openai
      commercial_openai_base_url:
        description: "Commercial OpenAI-compatible base URL for Gate 2 validation"
        required: false
        default: ""
        type: string
      commercial_openai_model:
        description: "Commercial OpenAI-compatible model for Gate 2 validation"
        required: false
        default: ""
        type: string
      local_llm_profile:
        description: "Run local Qwen 9B clean-room validation (skip or qwen3.5-9b)"
        required: false
        default: skip
        type: choice
        options:
          - skip
          - qwen3.5-9b
      local_llm_runner_label:
        description: "Self-hosted GPU runner label for local Qwen validation"
        required: false
        default: ""
        type: string
      local_llm_model_file:
        description: "llama.cpp model file for local Qwen 9B validation"
        required: false
        default: "Qwen3.5-9B-UD-Q4_K_XL.gguf"
        type: string

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize workspace refs
        shell: bash
        run: |
          {
            echo "### Workspace compatibility refs"
            echo
            echo "| Repo | Requested ref | Resolved commit |"
            echo "| --- | --- | --- |"
            echo "| data | \`${{ steps.workspace-refs.outputs.data_ref }}\` | \`${{ steps.workspace-siblings.outputs.data_sha }}\` |"
            echo "| eval | \`${{ steps.workspace-refs.outputs.eval_ref }}\` | \`${{ steps.workspace-siblings.outputs.eval_sha }}\` |"
            echo "| forecast | \`${{ steps.workspace-refs.outputs.forecast_ref }}\` | \`${{ steps.workspace-siblings.outputs.forecast_sha }}\` |"
            echo "| train | \`${{ steps.workspace-refs.outputs.train_ref }}\` | \`${{ steps.workspace-siblings.outputs.train_sha }}\` |"
            echo
            if [ -n "${{ steps.workspace-refs.outputs.coordination_context }}" ]; then
              echo "Coordination context: ${{ steps.workspace-refs.outputs.coordination_context }}"
              echo
            fi
            echo "Default push/pull_request CI validates against explicit \`main\` upstream refs. Use workflow_dispatch for coordinated validation against exact upstream refs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package and test tools
        run: |
          uv pip install --system -e ./data -e ./eval -e ./forecast -e ./train -e .
          uv pip install --system ruff mypy pytest build

      - name: Release command claims
        run: python scripts/check_release_claims.py --repo-root . --contract docs/release-command-contract.json --scope xrtm

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/xrtm

      - name: Pytest
        run: pytest tests

      - name: Build package
        run: python -m build

      - name: Install built wheel and smoke CLI
        shell: bash
        run: |
          python -m venv /tmp/xrtm-wheel-smoke
          uv pip install --python /tmp/xrtm-wheel-smoke/bin/python -e ./data -e ./eval -e ./forecast -e ./train dist/xrtm-*.whl
          /tmp/xrtm-wheel-smoke/bin/python scripts/check_installed_cli_surface.py --xrtm-bin /tmp/xrtm-wheel-smoke/bin/xrtm
          /tmp/xrtm-wheel-smoke/bin/xrtm doctor
          /tmp/xrtm-wheel-smoke/bin/xrtm web --smoke

  released-stack-smoke:
    name: Released stack smoke ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install build tool
        run: uv pip install --system build

      - name: Build package
        run: |
          python -m build

      - name: Install release-track stack
        shell: bash
        run: |
          python -m venv /tmp/xrtm-release-smoke
          uv pip install --python /tmp/xrtm-release-smoke/bin/python -e ./data -e ./eval -e ./forecast -e ./train dist/xrtm-*.whl

      - name: Smoke release-track stack
        shell: bash
        run: |
          release_smoke_bin=/tmp/xrtm-release-smoke/bin
          "$release_smoke_bin"/xrtm --version
          "$release_smoke_bin"/xrtm-data --version
          "$release_smoke_bin"/forecast --version
          "$release_smoke_bin"/xrtm-forecast --version
          "$release_smoke_bin"/xrtm-train --version
          "$release_smoke_bin"/python - <<'PY'
          import xrtm
          import xrtm.data
          import xrtm.eval
          import xrtm.forecast
          import xrtm.train
          print("released stack imports ok")
          PY
          "$release_smoke_bin"/python scripts/check_installed_cli_surface.py --xrtm-bin "$release_smoke_bin"/xrtm
          "$release_smoke_bin"/xrtm doctor
          "$release_smoke_bin"/xrtm start --runs-dir /tmp/xrtm-release-smoke
          "$release_smoke_bin"/xrtm runs show latest --runs-dir /tmp/xrtm-release-smoke
          "$release_smoke_bin"/xrtm artifacts inspect --latest --runs-dir /tmp/xrtm-release-smoke
          "$release_smoke_bin"/xrtm report html --latest --runs-dir /tmp/xrtm-release-smoke
          "$release_smoke_bin"/xrtm web --runs-dir /tmp/xrtm-release-smoke --smoke

  provider-free-cleanroom:
    name: Provider-free clean-room (${{ github.event.inputs.cleanroom_artifact_source }})
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.cleanroom_artifact_source != 'skip'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize release-validation refs
        shell: bash
        run: |
          {
            echo "### Provider-free clean-room validation refs"
            echo
            echo "| Repo | Requested ref | Resolved commit |"
            echo "| --- | --- | --- |"
            echo "| data | \`${{ steps.workspace-refs.outputs.data_ref }}\` | \`${{ steps.workspace-siblings.outputs.data_sha }}\` |"
            echo "| eval | \`${{ steps.workspace-refs.outputs.eval_ref }}\` | \`${{ steps.workspace-siblings.outputs.eval_sha }}\` |"
            echo "| forecast | \`${{ steps.workspace-refs.outputs.forecast_ref }}\` | \`${{ steps.workspace-siblings.outputs.forecast_sha }}\` |"
            echo "| train | \`${{ steps.workspace-refs.outputs.train_ref }}\` | \`${{ steps.workspace-siblings.outputs.train_sha }}\` |"
            echo
            echo "Artifact source: \`${{ github.event.inputs.cleanroom_artifact_source }}\`"
            echo
            if [ -n "${{ steps.workspace-refs.outputs.coordination_context }}" ]; then
              echo "Coordination context: ${{ steps.workspace-refs.outputs.coordination_context }}"
              echo
            fi
            echo "Use \`wheelhouse\` before publishing a coordinated release candidate. Re-run this workflow with \`pypi\` after publication so the release record includes published-artifact clean-room evidence."
            echo
            echo "Local-LLM clean-room acceptance stays conditional/manual until a compatible runner, model directory, and bounded service lane are available."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run provider-free clean-room acceptance
        shell: bash
        env:
          ARTIFACT_SOURCE: ${{ github.event.inputs.cleanroom_artifact_source }}
          ARTIFACT_DIR: acceptance-studies/docker-provider-free/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python scripts/docker_provider_free_acceptance.py host \
            --workspace-root . \
            --xrtm-repo-root . \
            --artifact-source "$ARTIFACT_SOURCE" \
            --artifacts-dir "$ARTIFACT_DIR"

      - name: Summarize clean-room evidence
        if: always()
        shell: bash
        env:
          ARTIFACT_DIR: acceptance-studies/docker-provider-free/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          summary_path="$ARTIFACT_DIR/summary.json"
          if [ ! -f "$summary_path" ]; then
            echo "Provider-free clean-room summary missing: \`$summary_path\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          SUMMARY_PATH="$summary_path" python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["SUMMARY_PATH"])
          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          release = payload["xrtm_release"]
          operator_run_ids = release["operator"]["run_ids"]
          print("### Provider-free clean-room evidence")
          print()
          print(f"- summary path: `{summary_path}`")
          print(f"- artifact source: `{payload['artifact_source']}`")
          print(f"- overall status: `{payload['status']}`")
          print(f"- first-success status: `{release['first_success']['status']}`")
          print(f"- operator monitor run: `{operator_run_ids[-1]}`")
          print(f"- research-eval forecast count: `{release['research_eval']['forecast_count']}`")
          print()
          print("Attach this uploaded artifact to the release-readiness record. Local-LLM clean-room evidence remains a separate conditional follow-up when provider/local-model behavior changed.")
          PY

      - name: Upload clean-room evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-free-cleanroom-${{ github.run_id }}-${{ github.run_attempt }}
          path: acceptance-studies/docker-provider-free/ci-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn

  local-llm-cleanroom:
    name: Local-LLM clean-room (${{ github.event.inputs.local_llm_profile }})
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.local_llm_profile != 'skip' && github.event.inputs.local_llm_runner_label != ''
    runs-on: ${{ github.event.inputs.local_llm_runner_label }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize local Qwen 9B validation refs
        shell: bash
        run: |
          {
            echo "### Local Qwen 9B clean-room validation refs"
            echo
            echo "| Repo | Requested ref | Resolved commit |"
            echo "| --- | --- | --- |"
            echo "| data | \`${{ steps.workspace-refs.outputs.data_ref }}\` | \`${{ steps.workspace-siblings.outputs.data_sha }}\` |"
            echo "| eval | \`${{ steps.workspace-refs.outputs.eval_ref }}\` | \`${{ steps.workspace-siblings.outputs.eval_sha }}\` |"
            echo "| forecast | \`${{ steps.workspace-refs.outputs.forecast_ref }}\` | \`${{ steps.workspace-siblings.outputs.forecast_sha }}\` |"
            echo "| train | \`${{ steps.workspace-refs.outputs.train_ref }}\` | \`${{ steps.workspace-siblings.outputs.train_sha }}\` |"
            echo
            echo "Profile: \`${{ github.event.inputs.local_llm_profile }}\`"
            echo "Model file: \`${{ github.event.inputs.local_llm_model_file }}\`"
            echo "Runner: \`${{ github.event.inputs.local_llm_runner_label }}\`"
            echo
            echo "This lane is manual/self-hosted because it requires a GPU-capable runner and a locally mounted llama.cpp model."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run local Qwen 9B clean-room validation
        shell: bash
        env:
          ARTIFACT_DIR: ${{ github.workspace }}/acceptance-studies/local-llm-qwen-9b/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python scripts/docker_local_llm_acceptance.py host \
            --workspace-root "$GITHUB_WORKSPACE" \
            --xrtm-repo-root "$GITHUB_WORKSPACE" \
            --artifact-source wheelhouse \
            --artifacts-dir "$ARTIFACT_DIR" \
            --llama-model-file "${{ github.event.inputs.local_llm_model_file }}" \
            --validation-profile release \
            --min-gpu-benchmark-seconds 1800 \
            --min-gpu-active-samples 60 \
            --min-gpu-memory-mib 4096

      - name: Summarize local Qwen 9B evidence
        if: always()
        shell: bash
        env:
          ARTIFACT_DIR: ${{ github.workspace }}/acceptance-studies/local-llm-qwen-9b/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          summary_path="$ARTIFACT_DIR/summary.json"
          if [ ! -f "$summary_path" ]; then
            echo "Local Qwen 9B summary missing: \`$summary_path\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          SUMMARY_PATH="$summary_path" python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["SUMMARY_PATH"])
          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          gpu = payload.get("gpu_telemetry", {})
          release = payload.get("xrtm_release_local_llm", {})
          print("### Local Qwen 9B clean-room evidence")
          print()
          print(f"- summary path: `{summary_path}`")
          print(f"- status: `{payload.get('status')}`")
          print(f"- model: `{release.get('models')}`")
          print(f"- flagship benchmark run: `{release.get('flagship_benchmark_run_id')}`")
          print(f"- competition dry-run: `{release.get('competition_run_id')}`")
          print(f"- GPU duration seconds: `{gpu.get('duration_seconds')}`")
          print(f"- GPU active samples: `{gpu.get('active_sample_count')}`")
          print(f"- GPU peak memory MiB: `{gpu.get('peak_memory_used_mib')}`")
          PY

      - name: Upload local Qwen 9B evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-llm-qwen-9b-${{ github.run_id }}-${{ github.run_attempt }}
          path: acceptance-studies/local-llm-qwen-9b/ci-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn

  commercial-openai-compatible-cleanroom:
    name: Commercial OpenAI-compatible clean-room (${{ github.event.inputs.commercial_openai_profile }})
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.commercial_openai_profile != 'skip'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install build tool
        run: uv pip install --system build

      - name: Build package
        run: python -m build

      - name: Validate Commercial OpenAI-compatible clean-room
        shell: bash
        env:
          BASE_URL: ${{ github.event.inputs.commercial_openai_base_url }}
          MODEL: ${{ github.event.inputs.commercial_openai_model }}
          PROFILE: ${{ github.event.inputs.commercial_openai_profile }}
          OPENAI_API_KEY: ${{ secrets.XRTM_OPENAI_COMPATIBLE_API_KEY }}
          ARTIFACT_DIR: acceptance-studies/commercial-openai-compatible/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$MODEL" ]; then
            echo "commercial_openai_base_url and commercial_openai_model are required" >&2
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "XRTM_OPENAI_COMPATIBLE_API_KEY secret is required for commercial OpenAI-compatible validation" >&2
            exit 1
          fi

          mkdir -p "$ARTIFACT_DIR"
          uv venv "$ARTIFACT_DIR/venv"
          uv pip install --python "$ARTIFACT_DIR/venv/bin/python" -e ./data -e ./eval -e ./forecast -e ./train dist/xrtm-*.whl
          "$ARTIFACT_DIR/venv/bin/python" scripts/check_release_claims.py --repo-root . --contract docs/release-command-contract.json --scope xrtm
          "$ARTIFACT_DIR/venv/bin/xrtm" doctor
          "$ARTIFACT_DIR/venv/bin/xrtm" demo --provider local-llm --base-url "$BASE_URL" --model "$MODEL" --api-key "$OPENAI_API_KEY" --limit 1 --max-tokens 768 --runs-dir "$ARTIFACT_DIR/runs"
          "$ARTIFACT_DIR/venv/bin/xrtm" runs show latest --runs-dir "$ARTIFACT_DIR/runs"
          "$ARTIFACT_DIR/venv/bin/xrtm" artifacts inspect --latest --runs-dir "$ARTIFACT_DIR/runs"
          "$ARTIFACT_DIR/venv/bin/xrtm" report html --latest --runs-dir "$ARTIFACT_DIR/runs"
          "$ARTIFACT_DIR/venv/bin/xrtm" web --runs-dir "$ARTIFACT_DIR/runs" --smoke
          PROFILE="$PROFILE" ARTIFACT_DIR="$ARTIFACT_DIR" "$ARTIFACT_DIR/venv/bin/python" - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_dir = Path(os.environ["ARTIFACT_DIR"])
          runs_dir = artifact_dir / "runs"
          run_ids = sorted(path.name for path in runs_dir.iterdir() if path.is_dir())
          if not run_ids:
            raise SystemExit("no commercial OpenAI-compatible run artifacts were produced")
          run_dir = runs_dir / run_ids[-1]
          report_path = run_dir / "report.html"
          payload = {
              "profile": os.environ["PROFILE"],
              "run_id": run_dir.name,
              "report_exists": report_path.exists(),
              "run_dir": str(run_dir),
          }
          if not report_path.exists():
              raise SystemExit(f"expected report at {report_path}")
          (artifact_dir / "summary.json").write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Summarize commercial OpenAI-compatible evidence
        if: always()
        shell: bash
        env:
          ARTIFACT_DIR: acceptance-studies/commercial-openai-compatible/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          summary_path="$ARTIFACT_DIR/summary.json"
          if [ ! -f "$summary_path" ]; then
            echo "Commercial OpenAI-compatible summary missing: \`$summary_path\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          SUMMARY_PATH="$summary_path" python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["SUMMARY_PATH"])
          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          print("### Commercial OpenAI-compatible clean-room evidence")
          print()
          print(f"- summary path: `{summary_path}`")
          print(f"- profile: `{payload['profile']}`")
          print(f"- run id: `{payload['run_id']}`")
          print(f"- report exists: `{payload['report_exists']}`")
          print(f"- artifact dir: `{payload['run_dir']}`")
          PY

      - name: Upload commercial OpenAI-compatible evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-openai-compatible-${{ github.run_id }}-${{ github.run_attempt }}
          path: acceptance-studies/commercial-openai-compatible/ci-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn

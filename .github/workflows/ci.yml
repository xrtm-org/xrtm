name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      coordination_context:
        description: "Linked issue/PR family or release-train note"
        required: false
        type: string
      data_ref:
        description: "Explicit xrtm-org/data ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      eval_ref:
        description: "Explicit xrtm-org/eval ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      forecast_ref:
        description: "Explicit xrtm-org/forecast ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      train_ref:
        description: "Explicit xrtm-org/train ref (branch, tag, SHA, or refs/pull/.../head)"
        required: false
        default: main
        type: string
      cleanroom_artifact_source:
        description: "Run provider-free clean-room release validation (skip, wheelhouse, or pypi)"
        required: false
        default: skip
        type: choice
        options:
          - skip
          - wheelhouse
          - pypi

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize workspace refs
        shell: bash
        run: |
          {
            echo "### Workspace compatibility refs"
            echo
            echo "| Repo | Requested ref | Resolved commit |"
            echo "| --- | --- | --- |"
            echo "| data | \`${{ steps.workspace-refs.outputs.data_ref }}\` | \`${{ steps.workspace-siblings.outputs.data_sha }}\` |"
            echo "| eval | \`${{ steps.workspace-refs.outputs.eval_ref }}\` | \`${{ steps.workspace-siblings.outputs.eval_sha }}\` |"
            echo "| forecast | \`${{ steps.workspace-refs.outputs.forecast_ref }}\` | \`${{ steps.workspace-siblings.outputs.forecast_sha }}\` |"
            echo "| train | \`${{ steps.workspace-refs.outputs.train_ref }}\` | \`${{ steps.workspace-siblings.outputs.train_sha }}\` |"
            echo
            if [ -n "${{ steps.workspace-refs.outputs.coordination_context }}" ]; then
              echo "Coordination context: ${{ steps.workspace-refs.outputs.coordination_context }}"
              echo
            fi
            echo "Default push/pull_request CI validates against explicit \`main\` upstream refs. Use workflow_dispatch for coordinated validation against exact upstream refs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package and test tools
        run: |
          uv pip install --system -e ./data -e ./eval -e ./forecast -e ./train -e .
          uv pip install --system ruff mypy pytest build

      - name: Release command claims
        run: python scripts/check_release_claims.py --repo-root . --contract docs/release-command-contract.json --scope xrtm

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/xrtm

      - name: Pytest
        run: pytest tests

      - name: Build package
        run: python -m build

      - name: Install built wheel and smoke CLI
        shell: bash
        run: |
          python -m venv /tmp/xrtm-wheel-smoke
          uv pip install --python /tmp/xrtm-wheel-smoke/bin/python -e ./data -e ./eval -e ./forecast -e ./train dist/xrtm-*.whl
          /tmp/xrtm-wheel-smoke/bin/xrtm --help
          /tmp/xrtm-wheel-smoke/bin/xrtm doctor
          /tmp/xrtm-wheel-smoke/bin/xrtm web --smoke

  released-stack-smoke:
    name: Released stack smoke ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install build tool
        run: uv pip install --system build

      - name: Build package
        run: |
          python -m build

      - name: Install release-track stack
        shell: bash
        run: |
          python -m venv /tmp/xrtm-release-smoke
          uv pip install --python /tmp/xrtm-release-smoke/bin/python -e ./data -e ./eval -e ./forecast -e ./train dist/xrtm-*.whl

      - name: Smoke release-track stack
        shell: bash
        run: |
          /tmp/xrtm-release-smoke/bin/xrtm --version
          /tmp/xrtm-release-smoke/bin/xrtm-data --version
          /tmp/xrtm-release-smoke/bin/forecast --version
          /tmp/xrtm-release-smoke/bin/xrtm-forecast --version
          /tmp/xrtm-release-smoke/bin/xrtm-train --version
          /tmp/xrtm-release-smoke/bin/python - <<'PY'
          import xrtm
          import xrtm.data
          import xrtm.eval
          import xrtm.forecast
          import xrtm.train
          print("released stack imports ok")
          PY
          /tmp/xrtm-release-smoke/bin/xrtm doctor
          /tmp/xrtm-release-smoke/bin/xrtm start --runs-dir /tmp/xrtm-release-smoke
          run_dir="$(find /tmp/xrtm-release-smoke -mindepth 1 -maxdepth 1 -type d | sort | head -n 1)"
          run_id="$(basename "$run_dir")"
          xrtm runs show "$run_id" --runs-dir /tmp/xrtm-release-smoke
          xrtm artifacts inspect "$run_dir"
          xrtm report html "$run_dir"
          xrtm web --runs-dir /tmp/xrtm-release-smoke --smoke

  provider-free-cleanroom:
    name: Provider-free clean-room (${{ github.event.inputs.cleanroom_artifact_source }})
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.cleanroom_artifact_source != 'skip'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve workspace refs
        id: workspace-refs
        shell: bash
        env:
          INPUT_COORDINATION_CONTEXT: ${{ github.event.inputs.coordination_context || '' }}
          INPUT_DATA_REF: ${{ github.event.inputs.data_ref || '' }}
          INPUT_EVAL_REF: ${{ github.event.inputs.eval_ref || '' }}
          INPUT_FORECAST_REF: ${{ github.event.inputs.forecast_ref || '' }}
          INPUT_TRAIN_REF: ${{ github.event.inputs.train_ref || '' }}
        run: |
          default_ref="main"

          requested_ref() {
            local value="$1"
            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "$default_ref"
            fi
          }

          {
            echo "coordination_context=${INPUT_COORDINATION_CONTEXT}"
            echo "data_ref=$(requested_ref "$INPUT_DATA_REF")"
            echo "eval_ref=$(requested_ref "$INPUT_EVAL_REF")"
            echo "forecast_ref=$(requested_ref "$INPUT_FORECAST_REF")"
            echo "train_ref=$(requested_ref "$INPUT_TRAIN_REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workspace siblings
        id: workspace-siblings
        shell: bash
        run: |
          checkout_repo() {
            local repo="$1"
            local ref="$2"
            git init -q "$repo"
            git -C "$repo" remote add origin "https://github.com/xrtm-org/${repo}.git"
            git -C "$repo" fetch --depth 1 --quiet origin "$ref"
            git -C "$repo" checkout --detach --quiet FETCH_HEAD
            git -C "$repo" rev-parse HEAD
          }

          data_sha="$(checkout_repo data "${{ steps.workspace-refs.outputs.data_ref }}")"
          eval_sha="$(checkout_repo eval "${{ steps.workspace-refs.outputs.eval_ref }}")"
          forecast_sha="$(checkout_repo forecast "${{ steps.workspace-refs.outputs.forecast_ref }}")"
          train_sha="$(checkout_repo train "${{ steps.workspace-refs.outputs.train_ref }}")"

          {
            echo "data_sha=$data_sha"
            echo "eval_sha=$eval_sha"
            echo "forecast_sha=$forecast_sha"
            echo "train_sha=$train_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize release-validation refs
        shell: bash
        run: |
          {
            echo "### Provider-free clean-room validation refs"
            echo
            echo "| Repo | Requested ref | Resolved commit |"
            echo "| --- | --- | --- |"
            echo "| data | \`${{ steps.workspace-refs.outputs.data_ref }}\` | \`${{ steps.workspace-siblings.outputs.data_sha }}\` |"
            echo "| eval | \`${{ steps.workspace-refs.outputs.eval_ref }}\` | \`${{ steps.workspace-siblings.outputs.eval_sha }}\` |"
            echo "| forecast | \`${{ steps.workspace-refs.outputs.forecast_ref }}\` | \`${{ steps.workspace-siblings.outputs.forecast_sha }}\` |"
            echo "| train | \`${{ steps.workspace-refs.outputs.train_ref }}\` | \`${{ steps.workspace-siblings.outputs.train_sha }}\` |"
            echo
            echo "Artifact source: \`${{ github.event.inputs.cleanroom_artifact_source }}\`"
            echo
            if [ -n "${{ steps.workspace-refs.outputs.coordination_context }}" ]; then
              echo "Coordination context: ${{ steps.workspace-refs.outputs.coordination_context }}"
              echo
            fi
            echo "Use \`wheelhouse\` before publishing a coordinated release candidate. Re-run this workflow with \`pypi\` after publication so the release record includes published-artifact clean-room evidence."
            echo
            echo "Local-LLM clean-room acceptance stays conditional/manual until a compatible runner, model directory, and bounded service lane are available."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run provider-free clean-room acceptance
        shell: bash
        env:
          ARTIFACT_SOURCE: ${{ github.event.inputs.cleanroom_artifact_source }}
          ARTIFACT_DIR: acceptance-studies/docker-provider-free/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python scripts/docker_provider_free_acceptance.py host \
            --workspace-root . \
            --xrtm-repo-root . \
            --artifact-source "$ARTIFACT_SOURCE" \
            --artifacts-dir "$ARTIFACT_DIR"

      - name: Summarize clean-room evidence
        if: always()
        shell: bash
        env:
          ARTIFACT_DIR: acceptance-studies/docker-provider-free/ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          summary_path="$ARTIFACT_DIR/summary.json"
          if [ ! -f "$summary_path" ]; then
            echo "Provider-free clean-room summary missing: \`$summary_path\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          SUMMARY_PATH="$summary_path" python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["SUMMARY_PATH"])
          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          release = payload["xrtm_release"]
          operator_run_ids = release["operator"]["run_ids"]
          print("### Provider-free clean-room evidence")
          print()
          print(f"- summary path: `{summary_path}`")
          print(f"- artifact source: `{payload['artifact_source']}`")
          print(f"- overall status: `{payload['status']}`")
          print(f"- first-success status: `{release['first_success']['status']}`")
          print(f"- operator monitor run: `{operator_run_ids[-1]}`")
          print(f"- research-eval forecast count: `{release['research_eval']['forecast_count']}`")
          print()
          print("Attach this uploaded artifact to the release-readiness record. Local-LLM clean-room evidence remains a separate conditional follow-up when provider/local-model behavior changed.")
          PY

      - name: Upload clean-room evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-free-cleanroom-${{ github.run_id }}-${{ github.run_attempt }}
          path: acceptance-studies/docker-provider-free/ci-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
